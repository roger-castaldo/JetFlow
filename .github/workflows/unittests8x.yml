name: .NET-Test

on:
  push:
    branches: [ 'master' ]
  pull_request:
    branches: [ 'master' ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          10.0.x
    - name: Restore
      run: dotnet restore Jetflow.slnx --force
    - name: Build-8.0 testing 
      run: dotnet build -p:BlockMD=true --no-restore Testing
    - name: Test-8.0 core
      run: dotnet test -p:BlockMD=true --no-build --verbosity normal Testing
